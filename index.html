<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>動画縦変換</title>
</head>
<body>

<input type="file" id="file">
<button id="load">FFmpeg読込</button>
<button id="run">変換</button>

<div id="status"></div>
<video id="out" controls></video>

<script type="module">

import { FFmpeg } from "https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js";
import { fetchFile } from "https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/esm/index.js";

let ffmpeg;
let ready=false;

document.getElementById("load").onclick = async () => {

document.getElementById("status").innerText="読込中";

ffmpeg = new FFmpeg();

await ffmpeg.load({
coreURL:"https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.10/dist/esm/ffmpeg-core.js",
wasmURL:"https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.10/dist/esm/ffmpeg-core.wasm"
});

ready=true;

document.getElementById("status").innerText="準備完了";

};

document.getElementById("run").onclick = async () => {

if(!ready){
alert("先に読込");
return;
}

let file=document.getElementById("file").files[0];

await ffmpeg.writeFile("in.mp4", await fetchFile(file));

await ffmpeg.exec([
"-i","in.mp4",
"-vf","transpose=2",
"out.mp4"
]);

let data=await ffmpeg.readFile("out.mp4");

let blob=new Blob([data.buffer],{type:"video/mp4"});

document.getElementById("out").src=URL.createObjectURL(blob);

};

</script>

</body>
</html>
